<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>link disabled</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="./css/main.css"
      media="screen"
    />
  </head>
  <body>
    <h1><code>link</code> disabled</h1>
    <p>
      There is another stylesheet that is not yet downloaded, nor applied to
      this page.
    </p>
    <p>How?</p>

    <pre>
<code>
&lt;link rel="stylesheet" href="https://example.com/load-me-later.css" disabled /&gt;
</code>
</pre>

    <div class="viewport"></div>

    <button type="button" id="load-stylesheet">Show da chicken! 🐣</button>

    <script type="module" src="js/load-stylesheet.js"></script>
  </body>
</html>
